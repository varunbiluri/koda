<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Koda</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #121820;
      --border: #1e2a38;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #22d3ee;
      --danger: #f87171;
      font-family: Inter, system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--panel);
    }
    header h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .status { font-size: 12px; color: var(--muted); }
    .status.connected { color: var(--accent); }
    main { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 820px;
      padding: 12px 14px;
      border-radius: 10px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
    }
    .msg.user { align-self: flex-end; background: #163041; border: 1px solid #1f4a5f; }
    .msg.assistant { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); }
    .msg.system { align-self: center; color: var(--muted); font-size: 12px; background: transparent; border: none; padding: 0; }
    .msg.error { align-self: stretch; border-color: var(--danger); color: var(--danger); background: #2a1212; }
    .stage { font-size: 12px; color: var(--muted); font-family: "IBM Plex Mono", monospace; }
    footer {
      border-top: 1px solid var(--border);
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      background: var(--panel);
    }
    form { display: flex; gap: 8px; }
    input, button, textarea {
      font: inherit;
    }
    #input {
      flex: 1;
      resize: none;
      min-height: 44px;
      max-height: 160px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 0 16px;
      background: var(--accent);
      color: #041016;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #setup {
      padding: 24px 16px;
      max-width: 520px;
      margin: 0 auto;
    }
    #setup label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    #setup input { width: 100%; margin-bottom: 12px; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
    #setup button { width: 100%; padding: 12px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="setup">
    <h2>Connect to Koda</h2>
    <p class="status">Point this app at a machine running <code>koda serve</code>.</p>
    <label for="serverUrl">Server URL</label>
    <input id="serverUrl" type="url" placeholder="http://127.0.0.1:8787" />
    <label for="authToken">Auth token</label>
    <input id="authToken" type="password" placeholder="Paste token from koda serve" />
    <button id="connectBtn" type="button">Connect</button>
    <p id="setupError" class="msg error hidden"></p>
  </div>

  <div id="app" class="hidden">
    <header>
      <div>
        <h1>Koda</h1>
        <div id="repoStatus" class="status">Connecting…</div>
      </div>
      <button id="settingsBtn" type="button" style="background:transparent;color:var(--muted);padding:8px;">Settings</button>
    </header>
    <main>
      <div id="messages"></div>
    </main>
    <footer>
      <form id="chatForm">
        <textarea id="input" rows="1" placeholder="Ask Koda to fix, refactor, or explain…"></textarea>
        <button id="sendBtn" type="submit">Send</button>
      </form>
    </footer>
  </div>

  <script>
    const STORAGE_KEY = 'koda-app-connection';

    const setup = document.getElementById('setup');
    const app = document.getElementById('app');
    const serverUrlInput = document.getElementById('serverUrl');
    const authTokenInput = document.getElementById('authToken');
    const connectBtn = document.getElementById('connectBtn');
    const setupError = document.getElementById('setupError');
    const repoStatus = document.getElementById('repoStatus');
    const messages = document.getElementById('messages');
    const chatForm = document.getElementById('chatForm');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const settingsBtn = document.getElementById('settingsBtn');

    let config = loadConfig();
    if (config) {
      serverUrlInput.value = config.serverUrl;
      authTokenInput.value = config.token;
    } else if (window.kodaDesktop) {
      serverUrlInput.value = window.kodaDesktop.getDefaultServerUrl();
      window.kodaDesktop.onToken((token) => {
        authTokenInput.value = token;
        connect();
      });
    }

    connectBtn.addEventListener('click', connect);
    settingsBtn.addEventListener('click', () => {
      app.classList.add('hidden');
      setup.classList.remove('hidden');
    });

    chatForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text || !config) return;
      input.value = '';
      appendMessage('user', text);
      await sendChat(text);
    });

    function loadConfig() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      } catch {
        return null;
      }
    }

    function saveConfig(next) {
      config = next;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
    }

    function appendMessage(role, text, className = '') {
      const el = document.createElement('div');
      el.className = `msg ${role} ${className}`.trim();
      el.textContent = text;
      messages.appendChild(el);
      messages.scrollTop = messages.scrollHeight;
      return el;
    }

    async function connect() {
      setupError.classList.add('hidden');
      const serverUrl = serverUrlInput.value.trim().replace(/\/$/, '');
      const token = authTokenInput.value.trim();
      if (!serverUrl || !token) {
        setupError.textContent = 'Server URL and token are required.';
        setupError.classList.remove('hidden');
        return;
      }

      try {
        const res = await fetch(`${serverUrl}/api/status`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (!res.ok) throw new Error(`Status ${res.status}`);
        const status = await res.json();
        saveConfig({ serverUrl, token });
        setup.classList.add('hidden');
        app.classList.remove('hidden');
        repoStatus.textContent = `${status.repoName} · ${status.branch} · ${status.model}`;
        repoStatus.classList.add('connected');
        messages.innerHTML = '';
        appendMessage('system', `Connected to ${status.rootPath}`);
      } catch (err) {
        setupError.textContent = `Could not connect: ${err.message}`;
        setupError.classList.remove('hidden');
      }
    }

    async function sendChat(message) {
      sendBtn.disabled = true;
      const assistantEl = appendMessage('assistant', '');
      let buffer = '';

      try {
        const res = await fetch(`${config.serverUrl}/api/chat`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${config.token}`,
          },
          body: JSON.stringify({ message }),
        });

        if (!res.ok || !res.body) {
          throw new Error(`Chat failed (${res.status})`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let pending = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          pending += decoder.decode(value, { stream: true });
          const chunks = pending.split('\n\n');
          pending = chunks.pop() || '';

          for (const chunk of chunks) {
            const lines = chunk.split('\n');
            let event = 'message';
            let data = '';
            for (const line of lines) {
              if (line.startsWith('event:')) event = line.slice(6).trim();
              if (line.startsWith('data:')) data += line.slice(5).trim();
            }
            if (!data) continue;
            const payload = JSON.parse(data);
            if (event === 'token') {
              buffer += payload.text || '';
              assistantEl.textContent = buffer;
            } else if (event === 'stage') {
              appendMessage('system', payload.message, 'stage');
            } else if (event === 'error') {
              appendMessage('error', payload.message, 'error');
            } else if (event === 'done' && payload.output && !buffer) {
              assistantEl.textContent = payload.output;
            }
          }
        }
      } catch (err) {
        appendMessage('error', err.message, 'error');
      } finally {
        sendBtn.disabled = false;
        messages.scrollTop = messages.scrollHeight;
      }
    }

    if (config) connect();
  </script>
</body>
</html>
